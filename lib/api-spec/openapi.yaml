openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: investigations
    description: Biographical/historical investigations
  - name: resources
    description: Curated educational resources
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /investigations:
    get:
      operationId: listInvestigations
      tags: [investigations]
      summary: List investigations
      responses:
        "200":
          description: List of investigations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Investigation"
    post:
      operationId: createInvestigation
      tags: [investigations]
      summary: Create an investigation
      security:
        - adminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestigationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investigation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /investigations/{id}:
    patch:
      operationId: updateInvestigation
      tags: [investigations]
      summary: Update an investigation
      security:
        - adminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestigationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investigation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: deleteInvestigation
      tags: [investigations]
      summary: Delete an investigation
      security:
        - adminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List educational resources
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Create a resource
      security:
        - adminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /resources/{id}:
    patch:
      operationId: updateResource
      tags: [resources]
      summary: Update a resource
      security:
        - adminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource
      security:
        - adminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  securitySchemes:
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    Investigation:
      type: object
      required:
        - id
        - slug
        - href
        - period
        - periodLabel
        - title
        - role
        - text
        - tags
        - featured
        - sortOrder
      properties:
        id: { type: integer }
        slug: { type: string }
        href: { type: string }
        period: { type: string }
        periodLabel: { type: string }
        title: { type: string }
        role: { type: string }
        text: { type: string }
        tags:
          type: array
          items: { type: string }
        featured: { type: boolean }
        sortOrder: { type: integer }
    InvestigationInput:
      type: object
      required:
        - slug
        - href
        - period
        - periodLabel
        - title
        - role
        - text
      properties:
        slug: { type: string, minLength: 1 }
        href: { type: string, minLength: 1 }
        period: { type: string, minLength: 1 }
        periodLabel: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        role: { type: string, minLength: 1 }
        text: { type: string, minLength: 1 }
        tags:
          type: array
          items: { type: string }
        featured: { type: boolean }
        sortOrder: { type: integer }
    InvestigationUpdate:
      type: object
      properties:
        slug: { type: string, minLength: 1 }
        href: { type: string, minLength: 1 }
        period: { type: string, minLength: 1 }
        periodLabel: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        role: { type: string, minLength: 1 }
        text: { type: string, minLength: 1 }
        tags:
          type: array
          items: { type: string }
        featured: { type: boolean }
        sortOrder: { type: integer }
    Resource:
      type: object
      required:
        - id
        - title
        - text
        - url
        - category
        - tags
        - featured
        - sortOrder
      properties:
        id: { type: integer }
        title: { type: string }
        text: { type: string }
        url: { type: string }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        featured: { type: boolean }
        sortOrder: { type: integer }
    ResourceInput:
      type: object
      required:
        - title
        - text
        - url
      properties:
        title: { type: string, minLength: 1 }
        text: { type: string, minLength: 1 }
        url: { type: string, minLength: 1 }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        featured: { type: boolean }
        sortOrder: { type: integer }
    ResourceUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        text: { type: string, minLength: 1 }
        url: { type: string, minLength: 1 }
        category: { type: string }
        tags:
          type: array
          items: { type: string }
        featured: { type: boolean }
        sortOrder: { type: integer }

