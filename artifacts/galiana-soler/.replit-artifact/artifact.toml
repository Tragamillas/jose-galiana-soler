kind = "web"
previewPath = "/"
title = "José E. Galiana Soler"
version = "1.0.0"
id = "artifacts/galiana-soler"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20156

[services.development]
run = "pnpm --filter @workspace/galiana-soler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/galiana-soler", "run", "build" ]
serve = "static"
publicDir = "artifacts/galiana-soler/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20156"
BASE_PATH = "/"
